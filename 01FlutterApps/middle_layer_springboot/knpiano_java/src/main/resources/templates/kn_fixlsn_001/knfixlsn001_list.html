<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>ダッシュボードテンプレート · Bootstrap</title>
    <link href="../assets/dist/css/bootstrap.css" th:href="@{/webjars/bootstrap/4.5.0/css/bootstrap.css}"
        rel="stylesheet">
    <link href="dashboard.css" th:href="@{/dashboard/dashboard.css}" rel="stylesheet">
    <style>
        .highlight {
            color: blue;
            text-align: left;
            text-decoration: underline;
            font-size: larger;
        }
    </style>
</head>

<body>
    <div th:replace="~{commons/bar::topbar}"></div>
    <div class="container-fluid">
        <div class="row">
            <div th:replace="~{commons/bar::sidebar(activeUri='kn_fixlsn_001_link_active')}"></div>
            <main role="main" class="col-md-9 ml-sm-auto col-lg-10 px-md-4">
                <h2 class="mt-4 mb-2">固定排课管理</h2>
                <p class="text-muted small mb-4" style="font-size: 0.875rem;">
                    ★业务说明：
                </p>
                <div class="highlight">
                    <p>※只有记录在档案表里的学生才可以进行固定排课操作，如果没有显示该学生，请先到学生档案表里确认该生否已经登记在案。</p>
                </div>
                <h2><a class="btn btn-sm btn-success" th:href="@{/kn_fixlsn_001}">固定授業新規登録</a></h2>
                <hr />
                <!-- 検索部 -->
                <form action="#" th:action="@{/kn_fixlsn_001/search}" th:object="${searchForm}" method="get">
                    <div class="form-row">
                        <div class="form-group col-md-2">
                            <input type="text" class="form-control" id="stuId" name="stuId"
                                th:value="${fixedLessonMap != null ? fixedLessonMap['stuId'] : ''}" placeholder="学生编号">
                        </div>
                        <div class="form-group col-md-2">
                            <input type="text" class="form-control" id="stuName" name="stuName"
                                th:value="${fixedLessonMap != null ? fixedLessonMap['stuName'] : ''}"
                                placeholder="学生姓名">
                        </div>
                        <div class="form-group col-md-2">
                            <input type="text" class="form-control" id="subjectId" name="subjectId"
                                th:value="${fixedLessonMap != null ? fixedLessonMap['subjectId'] : ''}"
                                placeholder="科目编号">
                        </div>
                        <div class="form-group col-md-2">
                            <input type="text" class="form-control" id="subjectName" name="subjectName"
                                th:value="${fixedLessonMap != null ? fixedLessonMap['subjectName'] : ''}"
                                placeholder="科目名称">
                        </div>
                        <div class="form-group col-md-2">
                            <input type="text" class="form-control" id="fixedHour" name="fixedHour"
                                th:value="${fixedLessonMap != null ? fixedLessonMap['fixedHour'] : ''}"
                                placeholder="固定時間:H">
                        </div>
                        <div class="form-group col-md-2">
                            <input type="text" class="form-control" id="fixedMinute" name="fixedMinute"
                                th:value="${fixedLessonMap != null ? fixedLessonMap['fixedMinute'] : ''}"
                                placeholder="固定時間:M">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">検 索</button>
                </form>
                <hr />
                <!-- Tab 周一到周日 Tab导航 -->
                <ul class="nav nav-tabs" id="myTab" role="tablist">
                    <li th:each="day : ${resultsTabDays}" class="nav-item">
                        <a th:classappend="${activeDay == day} ? 'nav-link active' : 'nav-link'" th:id="${day + '-tab'}"
                            data-toggle="tab" th:href="'#' + ${day}" role="tab" th:aria-controls="${day}"
                            th:aria-selected="${activeDay == day}">[[${day}]]</a>
                    </li>
                </ul>
                <!-- Tab 卡片项里显示 每周一到周日的固定排课一览  -->
                <div class="tab-content" id="myTabContent">
                    <div th:each="day : ${resultsTabDays}" th:id="${day}" class="tab-pane fade"
                        th:classappend="${activeDay == day} ? 'show active' : ''" role="tabpanel"
                        th:aria-labelledby="${day + '-tab'}">
                        <div th:replace="kn_fixlsn_001/fixlist_info_by_week :: lessonTable(${day}, ${day})"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <!-- KN自定义确认对话框 -->
    <div class="modal fade" id="knConfirmModal" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content kn-confirm-content">
                <div class="kn-confirm-header">
                    <div class="kn-confirm-icon">🗑️</div>
                    <div class="kn-confirm-title">操作确认</div>
                </div>
                <div class="kn-confirm-body">
                    <p id="knConfirmModalMsg" class="kn-confirm-msg">确定要删除吗？</p>
                </div>
                <div class="kn-confirm-footer">
                    <button type="button" class="kn-btn-cancel" data-dismiss="modal">✕ 取消</button>
                    <button type="button" class="kn-btn-ok" id="knConfirmModalOk">✓ 确认删除</button>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript" th:src="@{/webjars/jquery/3.5.1/jquery.slim.min.js}"></script>
    <script type="text/javascript" th:src="@{/webjars/popper.js/1.16.0/umd/popper.min.js}"></script>
    <script type="text/javascript" th:src="@{/webjars/bootstrap/4.5.0/js/bootstrap.min.js}"></script>
    <script>
        // KN自定义确认对话框（替代浏览器原生confirm）
        var _knConfirmCallback = null;
        function knConfirm(message, callback) {
            $('#knConfirmModalMsg').text(message);
            _knConfirmCallback = callback;
            $('#knConfirmModal').modal('show');
        }
        $('#knConfirmModalOk').click(function () {
            $('#knConfirmModal').modal('hide');
            if (typeof _knConfirmCallback === 'function') _knConfirmCallback();
            _knConfirmCallback = null;
        });

        // 删除按钮点击事件
        $(".deleteBtn").click(function () {
            var btn = $(this);
            knConfirm('确定要删除这条固定排课记录吗？', function () {
                $("#deleteSubjectForm").attr("action", btn.attr("subject_del_uri")).submit();
            });
        });
    </script>
    <style>
        .nav-tabs .nav-link.active {
            background-color: #298ae0;
            /* 绿色背景 */
            color: white;
            /* 白色文字 */
        }

        /* 添加以下样式 */
        .nav-tabs .nav-link.active {
            background-color: #298ae0;
            /* 绿色背景 */
            color: white;
            /* 白色文字 */
        }

        .nav-tabs .nav-link:hover {
            border-color: #298ae0 #298ae0 #fff;
        }

        /* ===== KN自定义确认对话框样式 ===== */
        .kn-confirm-content {
            border: none;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
        }
        .kn-confirm-header {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 100%);
            padding: 28px 20px 20px;
            text-align: center;
        }
        .kn-confirm-icon {
            font-size: 52px;
            line-height: 1;
            margin-bottom: 10px;
        }
        .kn-confirm-title {
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .kn-confirm-body {
            padding: 28px 30px 10px;
            text-align: center;
            background: #fff;
        }
        .kn-confirm-msg {
            font-size: 17px;
            color: #444;
            line-height: 1.7;
            margin: 0;
        }
        .kn-confirm-footer {
            background: #fff;
            border: none;
            padding: 20px 30px 30px;
            display: flex;
            justify-content: center;
            gap: 16px;
        }
        .kn-btn-cancel, .kn-btn-ok {
            padding: 10px 32px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }
        .kn-btn-cancel {
            background: #f0f0f0;
            color: #666;
            border: 2px solid #ddd;
        }
        .kn-btn-cancel:hover {
            background: #e0e0e0;
            color: #333;
        }
        .kn-btn-ok {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.45);
        }
        .kn-btn-ok:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(255, 107, 107, 0.55);
            color: #fff;
        }
        /* ===================================== */
    </style>
</body>

</html>
