<body>
    <div th:replace="~{commons/bar::topbar}"></div>
    <div class="container-fluid">

            <main role="main" class="col-md-9 ml-sm-auto col-lg-10 px-md-4">

                <!-- 检索区域 -->

                            <label>

                            <label>

                            </label>
                            <label>

                            </label>
                            <label>
                                <input type="checkbox" checked onchange="toggleColumn('col-actions')" /> 操作
                            </label>
                        </div>
                    </div>
                </div>

                <!-- 明細部 -->
                <div class="table-section">
                    <div class="table-responsive">
                        <table class="table table-striped table-sm styled-table">
                            <thead>
                                <tr>
                                    <th class="col-bankId">銀行ID</th>
                                    <th class="col-bankName">銀行名</th>
                                    <th class="col-createDate">作成日</th>
                                    <th class="col-updateDate">更新日</th>
                                    <th class="col-actions">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="bank : ${bankList}" th:if="${bankList != null && !bankList.isEmpty()}">
                                    <td class="col-bankId" th:text="${bank.bankId}"></td>
                                    <td class="col-bankName" th:text="${bank.bankName}"></td>
                                    <td class="col-createDate" th:text="${#dates.format(bank.createDate, 'yyyy-MM-dd hh:mm:ss')}"></td>
                                    <td class="col-updateDate" th:text="${#dates.format(bank.updateDate, 'yyyy-MM-dd hh:mm:ss')}"></td>
                                    <td class="col-actions">
                                        <a class="btn btn-sm btn-primary" th:href="@{/kn_bnk_001/} + ${bank.bankId}" method="GET">編集</a>
                                        <button class="btn btn-sm btn-danger deleteBtn" th:attr="bank_del_uri=@{/kn_bnk_001/}+${bank.bankId}">削除</button>

            <!-- 削除処理 -->
            <form id="deleteBankForm" action="" method="post">

    <script type="text/javascript" th:src="@{/webjars/jquery/3.5.1/jquery.slim.min.js}"></script>
    <script type="text/javascript" th:src="@{/webjars/popper.js/1.16.0/umd/popper.min.js}"></script>
    <script type="text/javascript" th:src="@{/webjars/bootstrap/4.5.0/js/bootstrap.min.js}"></script>

    <!-- 列控制相关的 JavaScript -->
    <script>
        // 存储列显示状态
        var columnStates = JSON.parse(localStorage.getItem('bankColumnStates') || '{}');

        // 控制列显示菜单的显示/隐藏
        function toggleColumnMenu(event) {
            event.stopPropagation();
            const menu = document.getElementById('columnMenu');
            menu.classList.toggle('show');
        }

        // 控制列的显示/隐藏
        function toggleColumn(columnClass) {
            // 更新状态
            columnStates[columnClass] = !columnStates[columnClass];
            const isVisible = columnStates[columnClass];

            // 更新所有具有该类名的元素
            const cells = document.getElementsByClassName(columnClass);
            Array.from(cells).forEach(cell => {
                cell.style.display = isVisible ? '' : 'none';
            });

            // 保存状态
            localStorage.setItem('bankColumnStates', JSON.stringify(columnStates));

            // 同步复选框状态
            const checkboxes = document.querySelectorAll(`input[onchange="toggleColumn('${columnClass}')"]`);
            checkboxes.forEach(checkbox => {
                checkbox.checked = isVisible;
            });
        }

        // 应用保存的列状态
        function applyColumnStates() {
            Object.entries(columnStates).forEach(([columnClass, isVisible]) => {
                const cells = document.getElementsByClassName(columnClass);
                Array.from(cells).forEach(cell => {
                    cell.style.display = isVisible ? '' : 'none';
                });

                // 更新复选框状态
                const checkboxes = document.querySelectorAll(`input[onchange="toggleColumn('${columnClass}')"]`);
                checkboxes.forEach(checkbox => {
                    checkbox.checked = isVisible;
                });
            });
        }

        // 点击其他地方关闭菜单
        document.addEventListener('click', function (event) {
            const menu = document.getElementById('columnMenu');
            if (!event.target.closest('.column-control')) {
                menu.classList.remove('show');
            }
        });

        // 页面加载时初始化列状态
        document.addEventListener('DOMContentLoaded', function () {
            applyColumnStates();
        });
    </script>

    <!-- KN删除确认对话框样式 -->

    <!-- KN删除确认对话框 -->
    <div class="modal fade" id="knDeleteModal" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content kn-delete-content">
                <div class="kn-delete-header">

                </div>
                <div class="kn-delete-body">
                    <p class="kn-delete-msg" id="knDeleteModalMsg">确定要删除这条银行记录吗？</p>
                </div>
                <div class="kn-delete-footer">
                    <button type="button" class="kn-btn-cancel" data-dismiss="modal">✕ 取消</button>
                    <button type="button" class="kn-btn-delete-ok" id="knDeleteModalOk">🗑️ 确认删除</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 削除プロセスには、JSで削除ボタンのクリックイベントで実现する-->
    <script>
        var _knDeleteCallback = null;
        $(".deleteBtn").click(function () {
            var btn = $(this);
            _knDeleteCallback = function() {
                var del_uri = btn.attr("bank_del_uri");
                $("#deleteBankForm").attr("action", del_uri).submit();
            };
            $('#knDeleteModal').modal('show');
        });
        $('#knDeleteModalOk').click(function() {
            $('#knDeleteModal').modal('hide');
            if (typeof _knDeleteCallback === 'function') _knDeleteCallback();
            _knDeleteCallback = null;
        });
    </script>
