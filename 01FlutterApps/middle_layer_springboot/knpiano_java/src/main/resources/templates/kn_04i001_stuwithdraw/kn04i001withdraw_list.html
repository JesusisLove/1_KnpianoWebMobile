<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>学生退学复学管理</title>
    <link href="../assets/dist/css/bootstrap.css" th:href="@{/webjars/bootstrap/4.5.0/css/bootstrap.css}"
        rel="stylesheet">
    <style>
        .btn-green {
            background-color: #28a745;
            color: white;
        }

        .nav-tabs .nav-link.active {
            background-color: #28a745;
            color: white;
        }

        .student-card {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .active-student {
            background-color: #d4edda !important;
        }

        .inactive-student {
            background-color: #e0e0e0 !important;
        }

        /* 欠费明细Modal */
        .modal-header-theme {
            background-color: #7A0485;
            color: white;
        }

        .modal-header-danger {
            background-color: #dc3545;
            color: white;
        }

        .fee-table th {
            background-color: #f5f5f5;
            font-size: 0.85rem;
        }

        .fee-table td {
            font-size: 0.9rem;
        }

        .fee-total-row {
            font-weight: bold;
            border-top: 2px solid #dee2e6;
        }
    </style>
    <link href="dashboard.css" th:href="@{/dashboard/dashboard.css}" rel="stylesheet">
</head>

<body>
    <div th:replace="~{commons/bar::topbar}"></div>
    <div class="container-fluid">
        <div class="row">
            <div th:replace="~{commons/bar::sidebar(activeUri='kn_stu_leave_or_return_link_active')}"></div>
            <main role="main" class="col-md-9 ml-sm-auto col-lg-10 px-md-4">
                <h2 class="mt-4 mb-2">学生退学复学管理</h2>
                <hr />
                <ul class="nav nav-tabs" id="studentTabs">
                    <li class="nav-item">
                        <a class="nav-link active" id="active-students-tab" data-toggle="tab"
                            href="#active-students">在课学生</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" id="inactive-students-tab" data-toggle="tab"
                            href="#inactive-students">已退学学生</a>
                    </li>
                </ul>

                <div class="tab-content mt-3">
                    <!-- Tab①：在课学生 -->
                    <div class="tab-pane fade show active" id="active-students">
                        <div class="table-responsive">
                            <table class="table table-striped table-sm">
                                <thead>
                                    <tr>
                                        <th>学生编号</th>
                                        <th>学生姓名</th>
                                        <th>同时删除<br>固定排课</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="info:${stuOnLsn}" class="student-card"
                                        onclick="highlightCard(this, 'active')">
                                        <td th:text="${info.stuId}"></td>
                                        <td th:text="${info.stuName}"></td>
                                        <td>
                                            <input type="checkbox" th:id="'deleteSchedule_' + ${info.stuId}"
                                                class="delete-schedule-checkbox" checked>
                                        </td>
                                        <td>
                                            <!-- 退学按钮：data-*属性传递stuId/stuName，JS读取后调用查账 -->
                                            <button class="btn btn-sm btn-primary leave-btn"
                                                th:data-stuid="${info.stuId}"
                                                th:data-stuname="${info.stuName}">
                                                退学
                                            </button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Tab②：已退学学生 -->
                    <div class="tab-pane fade" id="inactive-students">
                        <div class="table-responsive">
                            <table class="table table-striped table-sm">
                                <thead>
                                    <tr>
                                        <th>学生编号</th>
                                        <th>学生姓名</th>
                                        <th>在课状态</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="info:${stuLeaveLsn}" class="student-card"
                                        onclick="highlightCard(this, 'inactive')">
                                        <td th:text="${info.stuId}"></td>
                                        <td th:text="${info.stuName}"></td>
                                        <td th:text="${info.delFlg == 1 ? '已退学' : ''}"></td>
                                        <td>
                                            <a class="btn btn-sm btn-danger"
                                                th:href="@{/kn_stu_return/{stuId}(stuId=${info.stuId})}">复学</a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- ===== 欠费明细 Modal ===== -->
    <div class="modal fade" id="unpaidFeeModal" tabindex="-1" role="dialog">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <div class="modal-header modal-header-theme">
                    <h5 class="modal-title">⚠ 学费未交齐</h5>
                    <button type="button" class="close text-white" data-dismiss="modal">
                        <span>&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <p id="unpaidModalStudentName" class="font-weight-bold mb-2"></p>
                    <table class="table table-sm fee-table">
                        <thead>
                            <tr>
                                <th>科目</th>
                                <th>月份</th>
                                <th class="text-right">金额</th>
                            </tr>
                        </thead>
                        <tbody id="unpaidFeeTableBody"></tbody>
                        <tfoot>
                            <tr class="fee-total-row">
                                <td colspan="2">合计</td>
                                <td class="text-right text-danger" id="unpaidFeeTotal"></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">知道了</button>
                    <button type="button" class="btn btn-danger" id="forceLeaveBtn">强行退学</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 普通退学隐藏表单 -->
    <form id="leaveForm" method="get">
        <input type="hidden" name="deleteSchedule" id="leaveFormDeleteSchedule" value="true">
    </form>

    <!-- 强行退学隐藏表单 -->
    <form id="forceLeaveForm" method="post">
        <input type="hidden" th:name="${_csrf != null ? _csrf.parameterName : '_csrf'}"
               th:value="${_csrf != null ? _csrf.token : ''}">
        <input type="hidden" name="memo" id="forceLeaveFormMemo">
    </form>

    <!-- ===== 强行退学确认 Modal（二级，含理由输入）===== -->
    <div class="modal fade" id="forceLeaveConfirmModal" tabindex="-1" role="dialog">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <div class="modal-header modal-header-danger">
                    <h5 class="modal-title">⚠ 强行退学确认</h5>
                    <button type="button" class="close text-white" data-dismiss="modal">
                        <span>&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <p id="forceLeaveConfirmMsg" class="mb-3"></p>
                    <div id="forceLeaveTextareaWrap">
                        <label for="forceLeaveMemoInput" class="font-weight-bold">坏账理由（必填）</label>
                        <textarea id="forceLeaveMemoInput" class="form-control" rows="3"
                            placeholder="请输入坏账处理理由"></textarea>
                    </div>
                    <div id="forceLeaveErrorMsg" class="text-danger mt-2" style="display:none;">
                        请务必填写理由才可以执行坏账操作！
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger" id="forceLeaveConfirmBtn">确认强行退学</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        var contextPath = /*[[@{/}]]*/ '/';
        /*]]>*/

        function highlightCard(element, type) {
            document.querySelectorAll('.student-card').forEach(card => {
                card.classList.remove('active-student', 'inactive-student');
            });
            element.classList.add(type === 'active' ? 'active-student' : 'inactive-student');
        }

        // 退学前学费查账
        function checkFeeAndLeave(stuId, stuName) {
            $.getJSON(contextPath + 'kn_stu_fee_check/' + stuId, function(fees) {
                if (fees.length === 0) {
                    // 学费已交齐：直接退学
                    var deleteSchedule = document.getElementById('deleteSchedule_' + stuId);
                    var form = document.getElementById('leaveForm');
                    form.action = contextPath + 'kn_stu_leave/' + stuId;
                    document.getElementById('leaveFormDeleteSchedule').value =
                        (deleteSchedule && deleteSchedule.checked) ? 'true' : 'false';
                    form.submit();
                } else {
                    // 有欠费：弹出欠费明细Modal
                    showUnpaidFeeModal(stuId, stuName, fees);
                }
            }).fail(function() {
                alert('学费查账失败，请重试。');
            });
        }

        // 显示欠费明细Modal
        function showUnpaidFeeModal(stuId, stuName, fees) {
            document.getElementById('unpaidModalStudentName').textContent =
                stuName + ' 有以下未付款课费：';

            var tbody = document.getElementById('unpaidFeeTableBody');
            tbody.innerHTML = '';
            var total = 0;

            fees.forEach(function(fee, index) {
                var subject = fee.subjectName + (fee.subjectSubName ? '(' + fee.subjectSubName + ')' : '');
                var row = '<tr style="background-color:' + (index % 2 === 0 ? '#ffffff' : '#f9f9f9') + '">' +
                    '<td>' + subject + '</td>' +
                    '<td>' + fee.lsnMonth + '</td>' +
                    '<td class="text-right">¥' + fee.lsnFee.toLocaleString() + '</td>' +
                    '</tr>';
                tbody.innerHTML += row;
                total += fee.lsnFee;
            });

            document.getElementById('unpaidFeeTotal').textContent = '¥' + total.toLocaleString();

            // 绑定强行退学按钮 → 打开二级确认Modal
            var forceBtn = document.getElementById('forceLeaveBtn');
            forceBtn.onclick = function() {
                $('#unpaidFeeModal').modal('hide');
                document.getElementById('forceLeaveConfirmMsg').textContent =
                    '【' + stuName + '】的未付款课费（合计¥' + total.toLocaleString() +
                    '）将全部标记为坏账，此操作不可撤销。请填写理由后确认。';
                document.getElementById('forceLeaveMemoInput').value = '';
                document.getElementById('forceLeaveTextareaWrap').style.display = 'block';
                document.getElementById('forceLeaveErrorMsg').style.display = 'none';

                // 绑定二级确认按钮（每次重新绑定避免重复）
                var confirmBtn = document.getElementById('forceLeaveConfirmBtn');
                confirmBtn.onclick = null;
                confirmBtn.onclick = function() {
                    var memo = document.getElementById('forceLeaveMemoInput').value.trim();
                    if (!memo) {
                        document.getElementById('forceLeaveTextareaWrap').style.display = 'none';
                        document.getElementById('forceLeaveErrorMsg').style.display = 'block';
                        setTimeout(function() {
                            document.getElementById('forceLeaveTextareaWrap').style.display = 'block';
                            document.getElementById('forceLeaveErrorMsg').style.display = 'none';
                        }, 3000);
                        return;
                    }
                    $('#forceLeaveConfirmModal').modal('hide');
                    document.getElementById('forceLeaveFormMemo').value = memo;
                    var form = document.getElementById('forceLeaveForm');
                    form.action = contextPath + 'kn_stu_force_leave/' + stuId;
                    form.submit();
                };

                $('#forceLeaveConfirmModal').modal('show');
            };

            $('#unpaidFeeModal').modal('show');
        }

        // 退学按钮点击事件（通过data-*属性读取stuId/stuName，规避Thymeleaf安全限制）
        $(document).on('click', '.leave-btn', function() {
            var stuId   = $(this).data('stuid');
            var stuName = $(this).data('stuname');
            checkFeeAndLeave(stuId, stuName);
        });

        // Bootstrap Tab 激活
        $(document).ready(function () {
            $('a[data-toggle="tab"]').on('shown.bs.tab', function (e) {
                console.log("Tab切换到: " + $(e.target).attr('href'));
            });
            $('#inactive-students-tab').click(function (e) {
                e.preventDefault();
                $(this).tab('show');
            });
            $('#active-students-tab').click(function (e) {
                e.preventDefault();
                $(this).tab('show');
            });
        });
    </script>
</body>
</html>
